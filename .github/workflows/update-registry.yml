name: Update Registry

on:
  push:
    branches:
      - main
  schedule:
    - cron: "42 23 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Repositories
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh repo list k0pernikus --visibility public --json name,description,url,repositoryTopics,stargazerCount --limit 1000 > repos.json

      - name: Verify Data State
        run: |
          set -euo pipefail
          if ! jq -e 'type == "array"' repos.json >/dev/null; then
            echo "::error::repos.json is not a valid JSON array" >&2
            exit 1
          fi
          count=$(jq 'length' repos.json)
          echo "Found $count repositories"
          if [ "$count" -lt 10 ]; then
            echo "::error::Expected at least 10 repositories, got $count" >&2
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: repos-json
          path: repos.json

  update:
    needs: fetch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: repos-json
          path: .

      - name: Install dependencies
        run: uv sync

      - name: Run Lint & Type Check
        run: |
          uv run ruff check src
          uv run ty check src

      - name: Generate README
        run: uv run python src/generate.py

      - name: Commit and Push
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          git add README.md index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: update registry [skip ci]" && git push)
