name: Update Registry

on:
  push:
    branches:
      - main
  schedule:
    - cron: "42 23 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Repositories
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh repo list k0pernikus --visibility public --json name,description,url,repositoryTopics,stargazerCount --limit 1000 > repos.json

      - name: Verify Data State
        run: |
          set -euo pipefail
          if ! jq -e 'type == "array"' repos.json >/dev/null; then
            echo "::error::repos.json is not a valid JSON array" >&2
            exit 1
          fi
          count=$(jq 'length' repos.json)
          echo "Found $count repositories"
          if [ "$count" -lt 10 ]; then
            echo "::error::Expected at least 10 repositories, got $count" >&2
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: repos-json
          path: repos.json

  publish:
    needs: fetch
    runs-on: ubuntu-latest
    env:
      BOT_NAME: github-actions[bot]
      BOT_EMAIL: github-actions[bot]@users.noreply.github.com
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: repos-json
          path: .

      - name: Install dependencies
        run: uv sync

      - name: Run Lint & Type Check
        run: |
          uv run ruff check src
          uv run ty check src

      - name: Generate
        run: uv run python src/generate.py

      - name: Configure git identity
        run: |
          git config user.name "${BOT_NAME}"
          git config user.email "${BOT_EMAIL}"

      - name: Commit README to main
        run: |
          set -euo pipefail
          git add README.md
          if git diff --staged --quiet; then
            echo "No README changes."
            exit 0
          fi
          git commit -m "docs: update registry [skip ci]"
          git push origin main

      - name: Stage rendered output for gh-pages
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/pages"
          cp README.md index.html "${RUNNER_TEMP}/pages/"

      - name: Publish to gh-pages
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git worktree add pages-out gh-pages
          else
            git worktree add --orphan -b gh-pages pages-out
          fi
          find pages-out -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp "${RUNNER_TEMP}/pages/README.md" "${RUNNER_TEMP}/pages/index.html" pages-out/
          cd pages-out
          git add .
          if git diff --staged --quiet; then
            echo "No gh-pages changes."
            exit 0
          fi
          git commit -m "deploy: refresh gh-pages"
          git push origin gh-pages
