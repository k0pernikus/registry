name: Update Registry

on:
  push:
    branches:
      - main
  schedule:
    - cron: "42 23 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Repositories
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh repo list --visibility public --json name,description,url,repositoryTopics,stargazerCount --limit 1000 > repos.json

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: repos-json
          path: repos.json

  update:
    needs: fetch
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/astral-sh/uv:debian
    steps:
      - uses: actions/checkout@v4

      - name: Install Git
        run: |
          apt-get update -qq
          apt-get install -qq git

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: repos-json
          path: .

      - name: Install dependencies
        run: uv sync

      - name: Run Lint & Type Check
        run: |
          uv run ruff check src
          uv run ty check src

      - name: Generate README
        run: uv run python src/generate.py

      - name: Commit and Push
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_CONFIG_COUNT: "1"
          GIT_CONFIG_KEY_0: safe.directory
          GIT_CONFIG_VALUE_0: "*"
        run: |
          chown -R $(id -u):$(id -g) .
          git add README.md index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: update registry [skip ci]" && git push)
