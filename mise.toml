[tools]
uv = "0.11.14"
gh = "2.92.0"
lefthook = "2.1.6"

[hooks]
postinstall = "lefthook install"

[settings]
experimental = true

[tasks.sync]
description = "Install Python dependencies via uv"
run = "uv sync"

[tasks.fetch]
description = "Fetch GitHub repositories data (reuses repos.json if <30 days old; pass --force-repo-download or -f to refetch)"
depends = ["check"]
usage = '''
flag "-f --force-repo-download" help="Force re-download of repos.json"
'''
run = """
#!/usr/bin/env bash
set -euo pipefail

force=0
if [ "${usage_force_repo_download:-false}" = "true" ]; then
    force=1
fi

if [ "$force" -eq 0 ] && [ -f repos.json ] && [ -n "$(find repos.json -mtime -30 2>/dev/null)" ]; then
    echo "repos.json fresh (<30 days), reusing. Pass --force-repo-download (or -f) to refetch."
    exit 0
fi

gh repo list k0pernikus --visibility public --no-archived --json name,description,url,repositoryTopics,isFork --limit 1000 | jq . > repos.json
"""

[tasks.render]
description = "Render README.local.md (gitignored) and index.html for local dev. CI renders README.md."
depends = ["fetch"]
run = "uv run python src/generate.py --local"

[tasks.generate]
description = "Fetch and render"
depends = ["render"]

[tasks.check]
description = "Run linting and type checking in parallel"
depends = ["lint", "ty-check"]

[tasks.lint]
description = "Run linting"
depends = ["sync"]
run = "uv run ruff check src"

[tasks.lint-fix]
description = "Run linting and fix issues"
depends = ["sync"]
run = "uv run ruff check src --fix"

[tasks.ty-check]
description = "Run type checking"
depends = ["sync"]
run = "uv run ty check src"

[tasks.format]
description = "Format the source code"
depends = ["sync"]
run = "uv run ruff format src"

[tasks.serve]
description = "Serve the registry locally"
depends = ["generate"]
run = "uv run python -m http.server 3000 --bind 0.0.0.0"

[tasks.pages-enable]
description = "Enable GitHub Pages on gh-pages branch"
run = "gh api -X POST \"repos/$(gh repo view --json nameWithOwner -q .nameWithOwner)/pages\" -f 'source[branch]=gh-pages' -f 'source[path]=/'"
